:root{--bg:#f4f5f7;--ink:#101012;--ink2:#52525b;--ink3:#8a8a93;--hair:#e6e6e9;

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);padding:34px 22px 60px;}
.wrap{max-width:1120px;margin:0 auto;}
.hero{background:#fff;border:1px solid var(--hair);border-radius:20px;padding:34px 36px;position:relative;overflow:hidden;

.compare{display:flex;align-items:stretch;gap:14px;}
.card[dir=rtl] .compare{flex-direction:row-reverse;}
.pane{flex:1;background:#fafafa;border:1px solid var(--hair);border-radius:14px;padding:30px 16px 16px;position:relative;display:flex;align-items:center;justify-content:center;min-width:0;}
.pane img{height:430px;width:auto;aspect-ratio:210/297;max-width:100%;object-fit:cover;background:#fff;border-radius:5px;box-shadow:0 6px 20px rgba(0,0,0,.13);display:block;}
.pane .docwrap{position:relative;height:430px;width:304px;max-width:100%;flex:0 0 auto;overflow:hidden;background:#fff;border-radius:5px;box-shadow:0 6px 20px rgba(0,0,0,.13);}
.pane iframe.doc{position:absolute;top:0;left:0;width:840px;height:1188px;border:0;transform:scale(.3619);transform-origin:top left;display:block;}
.pane .docpane{display:flex;flex-direction:column;align-items:center;gap:11px;width:100%;}
.pane .tabs{display:flex;gap:6px;}
.pane .tab{font-family:'JetBrains Mono',monospace;font-size:8pt;font-weight:600;letter-spacing:.03em;padding:6px 13px;border-radius:8px;border:1px solid var(--blue-line);background:var(--blue-soft);color:var(--blue-dark);cursor:pointer;transition:.15s;}

.pane .docpanel{display:flex;flex-direction:column;align-items:center;gap:11px;}

.pane .dlbtn{font-family:'JetBrains Mono',monospace;font-size:8.5pt;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:9px 18px;border-radius:9px;border:0;background:var(--blue);color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(28,159,212,.35);transition:.15s;}

.pane .dlbtn:active{transform:translateY(1px);}
.card[dir=rtl] .tab,.card[dir=rtl] .dlbtn{font-family:'Cairo',sans-serif;letter-spacing:0;text-transform:none;font-weight:700;}
.pane.before img{filter:saturate(.96);}
.lab{position:absolute;top:10px;inset-inline-start:12px;font-family:'JetBrains Mono',monospace;font-size:7.5pt;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:6px;}

.lab.b{background:#efeef0;color:var(--ink2);border:1px solid var(--hair);}
.lab.a{background:var(--cream);color:#8a6a16;}
.arrow{flex:0 0 auto;align-self:center;width:42px;height:42px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(28,159,212,.45);}

.foot{text-align:center;color:var(--ink3);font-family:'JetBrains Mono',monospace;font-size:8.5pt;letter-spacing:.1em;margin-top:34px;display:flex;align-items:center;justify-content:center;gap:9px;}

@media(max-width:780px){.compare{flex-direction:column!important;}.arrow{transform:rotate(90deg);}.pane img{height:auto;width:100%;max-width:360px;}}

<script>
(function(){
  // Tab switching inside each .docpane
  document.querySelectorAll('.docpane').forEach(function(pane){
    var tabs = pane.querySelectorAll('.tab');
    tabs.forEach(function(tab){
      tab.addEventListener('click', function(){
        tabs.forEach(function(t){ t.classList.remove('active'); });
        tab.classList.add('active');
        pane.querySelectorAll('.docpanel').forEach(function(p){
          p.hidden = (p.id !== tab.dataset.target);
        });
      });
    });
  });
  // Download button → trigger the embedded doc's own print/export (same as its "Export PDF" button)
  document.querySelectorAll('.dlbtn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var f = document.getElementById(btn.dataset.frame);
      if(!f){ return; }
      try{
        f.contentWindow.focus();
        f.contentWindow.print();
      }catch(e){
        // e.g. opened via file:// where cross-frame access is blocked — open the doc so the user can export from there
        window.open(f.src, '_blank');
      }
    });
  });
})();
</script>
